definitions:
  models.CreateRecordRequest:
    properties:
      amount:
        type: number
      category:
        type: string
      date:
        type: string
      description:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.RecordType'
        enum:
        - income
        - expense
    required:
    - amount
    - category
    - date
    - type
    type: object
  models.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.Role'
        enum:
        - viewer
        - analyst
        - admin
    required:
    - email
    - name
    - password
    - role
    type: object
  models.DashboardSummary:
    properties:
      by_category_expense:
        additionalProperties:
          format: float64
          type: number
        type: object
      by_category_income:
        additionalProperties:
          format: float64
          type: number
        type: object
      monthly_trends:
        items:
          $ref: '#/definitions/models.MonthlyTrend'
        type: array
      net_balance:
        type: number
      recent_records:
        items:
          $ref: '#/definitions/models.FinancialRecord'
        type: array
      total_expenses:
        type: number
      total_income:
        type: number
    type: object
  models.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  models.FinancialRecord:
    properties:
      amount:
        type: number
      category:
        type: string
      created_at:
        type: string
      date:
        type: string
      description:
        type: string
      id:
        type: string
      type:
        $ref: '#/definitions/models.RecordType'
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.MonthlyTrend:
    properties:
      expense:
        type: number
      income:
        type: number
      month:
        type: string
    type: object
  models.PaginatedRecords:
    properties:
      data:
        items:
          $ref: '#/definitions/models.FinancialRecord'
        type: array
      limit:
        type: integer
      page:
        type: integer
      pages:
        type: integer
      total:
        type: integer
    type: object
  models.RecordType:
    enum:
    - income
    - expense
    type: string
    x-enum-varnames:
    - RecordIncome
    - RecordExpense
  models.Role:
    enum:
    - viewer
    - analyst
    - admin
    type: string
    x-enum-varnames:
    - RoleViewer
    - RoleAnalyst
    - RoleAdmin
  models.UpdateRecordRequest:
    properties:
      amount:
        type: number
      category:
        type: string
      date:
        type: string
      description:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.RecordType'
        enum:
        - income
        - expense
    type: object
  models.UpdateUserRequest:
    properties:
      active:
        type: boolean
      name:
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.Role'
        enum:
        - viewer
        - analyst
        - admin
    type: object
  models.User:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        $ref: '#/definitions/models.Role'
    type: object
  models.WeeklyTrend:
    properties:
      expense:
        type: number
      income:
        type: number
      week:
        type: string
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Authenticate with email and password. Returns a JWT Bearer token valid for 24 hours.

        **Dummy credentials:**
        - `admin@zorvyn.io` / `Admin@123` → role: admin
        - `analyst@zorvyn.io` / `Analyst@123` → role: analyst
        - `viewer@zorvyn.io` / `Viewer@123` → role: viewer
      parameters:
      - description: Email and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Revokes the current JWT token. The token will be rejected on subsequent
        requests.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the profile of the currently authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - auth
  /dashboard/summary:
    get:
      description: 'Returns aggregated financial data: total income/expenses, net
        balance, category breakdowns, recent 5 records, and monthly trends. Accessible
        by all authenticated roles.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DashboardSummary'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Dashboard summary
      tags:
      - dashboard
  /dashboard/weekly:
    get:
      description: Returns income and expense totals grouped by ISO week (YYYY-WNN)
        for the last 12 weeks. Accessible by all authenticated roles.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.WeeklyTrend'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Weekly trends
      tags:
      - dashboard
  /records:
    get:
      description: |-
        Returns paginated financial records. Supports filtering by type, category, date range, and free-text search.
        Accessible by analyst and admin roles.
      parameters:
      - description: Filter by type
        enum:
        - income
        - expense
        in: query
        name: type
        type: string
      - description: Filter by category (case-insensitive)
        in: query
        name: category
        type: string
      - description: Search in category and description
        in: query
        name: search
        type: string
      - description: Start date filter (RFC3339, e.g. 2026-03-01T00:00:00Z)
        in: query
        name: from
        type: string
      - description: End date filter (RFC3339, e.g. 2026-04-30T23:59:59Z)
        in: query
        name: to
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Page size, max 100 (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PaginatedRecords'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List financial records
      tags:
      - records
    post:
      consumes:
      - application/json
      description: Creates a new financial record. Accessible by analyst and admin
        roles.
      parameters:
      - description: Record payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateRecordRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.FinancialRecord'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create financial record
      tags:
      - records
  /records/{id}:
    delete:
      description: Soft-deletes a financial record (it is hidden from all queries
        but not permanently removed). Admin only.
      parameters:
      - description: Record UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete financial record
      tags:
      - records
    get:
      description: Returns a single financial record by its ID. Accessible by analyst
        and admin roles.
      parameters:
      - description: Record UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.FinancialRecord'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get record by ID
      tags:
      - records
    put:
      consumes:
      - application/json
      description: Partially updates a financial record. Only provided fields are
        changed. Accessible by analyst and admin.
      parameters:
      - description: Record UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (all optional)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateRecordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.FinancialRecord'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update financial record
      tags:
      - records
  /users:
    get:
      description: Returns all registered users sorted by creation date. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.User'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user with a hashed password and assigns a role. Admin
        only.
      parameters:
      - description: New user details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - users
  /users/{id}:
    delete:
      description: Permanently removes a user. An admin cannot delete their own account.
        Admin only.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      description: Returns a single user by their UUID. Admin only.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates a user's name, role, or active status. All fields are optional.
        Admin only.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - users
swagger: "2.0"
